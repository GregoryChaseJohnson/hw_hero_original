        if (!mobileUploadIsProcessing) {
          setComposeDraftUiVisible(true);
          setMobileUploadProcessingVisible(false);
        }
        mobileUploadImageEl.removeAttribute("src");
        mobileUploadImageEl.hidden = true;
        mobileUploadActionBarEl.hidden = true;
        mobileUploadActionBarEl.replaceChildren();
        mobileUploadErrorEl.hidden = true;
        mobileUploadErrorEl.textContent = "";
      };

      const showPendingMobileUploadImage = (pending) => {
        if (mobileUploadIsProcessing) {
          return;
        }
        mobileUploadHasPendingImage = true;
        mobileUploadBtn.hidden = true;
        setComposeDraftUiVisible(false);
        setMobileUploadProcessingVisible(false);
        const cacheBustedUrl = pending.created_at
          ? `${pending.image_url}${pending.image_url.includes("?") ? "&" : "?"}t=${encodeURIComponent(pending.created_at)}`
          : pending.image_url;
        mobileUploadImageEl.src = cacheBustedUrl;
        mobileUploadImageEl.hidden = false;
        mobileUploadActionBarEl.replaceChildren(
          mobileUploadSubmitBtn,
          mobileUploadReuploadBtn,
          mobileUploadCancelBtn,
        );
        mobileUploadActionBarEl.hidden = false;
        mobileUploadErrorEl.hidden = true;
        mobileUploadErrorEl.textContent = "";
        clearMobileUploadQrState();
      };

      const showMobileUploadQrState = async () => {
        if (mobileUploadHasPendingImage || mobileUploadIsProcessing) {
          return;
        }
        mobileUploadPanelEl.replaceChildren(mobileUploadQrEl);
        mobileUploadPanelEl.hidden = false;
        mobileUploadBtn.classList.add("is-open");
        mobileUploadErrorEl.hidden = true;
        mobileUploadErrorEl.textContent = "";
        if (!mobileUploadQrUrl) {
          mobileUploadBtn.disabled = true;
          try {
            mobileUploadQrUrl = await fetchMobileUploadQrUrl();
            mobileUploadQrEl.src = mobileUploadQrUrl;
          } catch (err) {
            console.error("mobile upload qr failed:", err);
          } finally {
            mobileUploadBtn.disabled = false;
          }
        }
      };

      const hideMobileUploadQrState = () => {
        if (mobileUploadHasPendingImage || mobileUploadIsProcessing) {
          return;
        }
        mobileUploadPanelEl.replaceChildren();
        mobileUploadPanelEl.hidden = true;
        mobileUploadBtn.classList.remove("is-open");
      };

      const refreshPendingMobileUpload = async () => {
        if (mobileUploadIsProcessing) {
          return;
        }
        try {
          const pending = await fetchPendingMobileUpload();
          if (pending && pending.pending && pending.image_url) {
            showPendingMobileUploadImage(pending);
          } else {
            clearMobileUploadImageState();
          }
        } catch (err) {
          console.error("pending mobile upload fetch failed:", err);
        }
      };
      mobileUploadRefreshFn = refreshPendingMobileUpload;
      mobileUploadImageEl.addEventListener("error", () => {
        clearMobileUploadImageState();
      });

      const resizeComposeInput = () => {
        const minHeightPx = 80;
        inputEl.style.height = "auto";
        inputEl.style.height = `${Math.max(minHeightPx, inputEl.scrollHeight)}px`;
      };

      const updateComposeSubmitState = () => {
        const hasText = Boolean((inputEl.value || "").replace(/\u200B/g, "").trim());
        submitBtn.classList.toggle("is-ready", hasText);
        submitBtn.setAttribute("aria-disabled", hasText ? "false" : "true");
        placeholderEl.hidden = hasText;
      };

      inputEl.addEventListener("blur", () => {
        updateComposeSubmitState();
      });

      inputEl.addEventListener("input", () => {
        updateComposeSubmitState();
      });

      mobileUploadBtn.addEventListener("click", async () => {
        if (mobileUploadHasPendingImage || mobileUploadIsProcessing) {
          return;
        }
        if (mobileUploadPanelEl.hidden) {
          await showMobileUploadQrState();
          await refreshPendingMobileUpload();
          return;
        }
        hideMobileUploadQrState();
      });
      mobileUploadSubmitBtn.addEventListener("click", async () => {
        mobileUploadIsProcessing = true;
        mobileUploadBtn.disabled = true;
        mobileUploadBtn.hidden = true;
        setComposeDraftUiVisible(false);
        setMobileUploadProcessingVisible(true);
        clearMobileUploadImageState();
        clearMobileUploadQrState();
        setComposeLoading(true);
        try {
          const body = await processPendingMobileUpload();
          mobileUploadErrorEl.hidden = true;
          mobileUploadErrorEl.textContent = "";
          await applyAnalysisResult(body, "");
        } catch (err) {
          mobileUploadIsProcessing = false;
          mobileUploadBtn.disabled = false;
          mobileUploadBtn.hidden = false;
          setMobileUploadProcessingVisible(false);
          console.error("processPendingMobileUpload failed:", err);
          mobileUploadErrorEl.hidden = false;
          mobileUploadErrorEl.textContent = err.message || "Failed to process image.";
          await refreshPendingMobileUpload();
        } finally {
          if (!mobileUploadIsProcessing) {
            mobileUploadBtn.disabled = false;
          }
          setComposeLoading(false);
        }
      });
      mobileUploadReuploadBtn.addEventListener("click", async () => {
        try {
          await clearPendingMobileUpload();
          clearMobileUploadImageState();
          await showMobileUploadQrState();
          await refreshPendingMobileUpload();
        } catch (err) {
          console.error("clearPendingMobileUpload failed:", err);
        }
      });
      mobileUploadCancelBtn.addEventListener("click", async () => {
        try {
          await clearPendingMobileUpload();
          clearMobileUploadImageState();
          hideMobileUploadQrState();
        } catch (err) {
          console.error("clearPendingMobileUpload failed:", err);
        }
      });

      const measureVisualLines = (text, maxWidth) => {
        if (!composeMeasureCtx || maxWidth <= 0) {
          return (text || "").split("\n");
        }
        const lines = [];
        const logicalLines = (text || "").split("\n");
        const measureChar = (char) => {
          const key = char === "\t" ? "    " : char;
          if (charWidthCache.has(key)) {
            return charWidthCache.get(key);
          }
          const width = composeMeasureCtx.measureText(key).width;
          charWidthCache.set(key, width);
          return width;
        };

        logicalLines.forEach((logicalLine) => {
          if (logicalLine.length === 0) {
            lines.push("");
            return;
          }
          let current = "";
          let currentWidth = 0;
          for (const char of logicalLine) {
            const charWidth = measureChar(char);
            if (current && currentWidth + charWidth > maxWidth) {
              lines.push(current);
              current = char;
              currentWidth = charWidth;
            } else {
              current += char;
              currentWidth += charWidth;
            }
          }
          lines.push(current);
        });
        return lines.length ? lines : [""];
      };

      const syncComposeOverlayNow = () => {
        composeOverlayFrameId = null;
        const styles = window.getComputedStyle(inputEl);
        if (composeMeasureCtx && styles.font !== lastMeasureFont) {
          composeMeasureCtx.font = styles.font;
          charWidthCache.clear();
          lastMeasureFont = styles.font;
        }

        const paddingTop = parseFloat(styles.paddingTop) || 0;
        const paddingRight = parseFloat(styles.paddingRight) || 0;
        const paddingBottom = parseFloat(styles.paddingBottom) || 0;
        const paddingLeft = parseFloat(styles.paddingLeft) || 0;
        const fontSizePx = parseFloat(styles.fontSize) || 16;
        const lineHeightPx = parseFloat(styles.lineHeight) || (fontSizePx * 1.45);
        const contentWidth = Math.max(1, inputEl.clientWidth - paddingLeft - paddingRight);
        const visualLines = measureVisualLines(inputEl.value || "", contentWidth);

        const fragment = document.createDocumentFragment();
        visualLines.forEach((lineText, idx) => {
          const lineEl = document.createElement("div");
          lineEl.className = "compose-line";
          lineEl.style.height = `${lineHeightPx}px`;
          if (/\S/.test(lineText)) {
            lineEl.classList.add("filled");
            lineEl.classList.add((idx % 2 === 0) ? "tone-a" : "tone-b");
          }
          fragment.appendChild(lineEl);
        });

        overlayContentEl.replaceChildren(fragment);
        overlayContentEl.style.padding = `${paddingTop}px ${paddingRight}px ${paddingBottom}px ${paddingLeft}px`;
        overlayContentEl.style.minHeight = `${Math.max(inputEl.scrollHeight, lineHeightPx + paddingTop + paddingBottom)}px`;
      };

      const scheduleComposeOverlaySync = () => {
        if (composeOverlayFrameId !== null) return;
        composeOverlayFrameId = window.requestAnimationFrame(syncComposeOverlayNow);
      };

      const setComposeLoading = (isLoading) => {
        submitBtn.disabled = isLoading;
        uploadBtn.disabled = isLoading;
        submitBtn.classList.toggle("is-loading", isLoading);
        uploadBtn.classList.toggle("is-loading", isLoading);
      };

      const applyAnalysisResult = async (body, fallbackText) => {
        const writing = body.writing || null;
        if (writing) {
          activeWritingLoadToken += 1;
          activeWritingId = writing.id || null;
          activeWritingText = getRecordSourceText(writing) || body.source_text || fallbackText || "";
          activeCorrectedText = getRecordCorrectedText(writing) || activeWritingText;
          sentenceDataArray = writing.output_data && Array.isArray(writing.output_data.sentences)
            ? writing.output_data.sentences
            : [];
          sentenceMappingArray = writing.sentence_mapping && Array.isArray(writing.sentence_mapping.sentences)
            ? writing.sentence_mapping.sentences
            : [];
        }
        await refreshSavedWritingsList();
        exitComposeMode();
        renderFullWritingView({ syncPanelState: true });
        renderCurrentWriting();
      };

      inputEl.addEventListener("input", () => {
        resizeComposeInput();
        scheduleComposeOverlaySync();
        updateComposeSubmitState();
      });

      inputEl.addEventListener("scroll", () => {
        scheduleComposeOverlaySync();
      });

      inputEl.addEventListener("keydown", (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === "Enter") {
          event.preventDefault();
          submitBtn.click();
        }
      });

      uploadBtn.addEventListener("click", () => {
        uploadInputEl.click();
      });

      uploadInputEl.addEventListener("change", async () => {
        const file = uploadInputEl.files && uploadInputEl.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append("image", file);
        setComposeLoading(true);
        try {
          const res = await fetch("/analyze_image", {
            method: "POST",
            body: formData,
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(body.error || body.details || `Request failed (${res.status})`);
          }
          await applyAnalysisResult(body, "");
        } catch (err) {
          console.error("analyze_image failed:", err);
        } finally {
          uploadInputEl.value = "";
          setComposeLoading(false);
        }
      });

      submitBtn.addEventListener("click", async () => {
        const submittedText = (inputEl.value || "").replace(/\u200B/g, "").trim();
        if (!submittedText) {
          updateComposeSubmitState();
          inputEl.focus();
          return;
        }
        setComposeLoading(true);
        try {
          const res = await fetch("/analyze_text", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ submitted_text: submittedText }),
          });
          const body = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(body.error || body.details || `Request failed (${res.status})`);
          }
          await applyAnalysisResult(body, submittedText);
        } catch (err) {
          console.error("analyze_text failed:", err);
        } finally {
          setComposeLoading(false);
          submitBtn.innerHTML = '<svg class="compose-submit-icon-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 20V6"/><path d="M5.5 11.25 12 5l6.5 6.25"/></svg>';
        }
      });

      contentEl.appendChild(inputShellEl);
      cardEl.appendChild(contentEl);
      cardEl.appendChild(mobileUploadEntryEl);
      cardEl.appendChild(actionsEl);
      centerEl.appendChild(cardEl);
      shellEl.appendChild(centerEl);
      upperScrollContent.appendChild(shellEl);
      composeVisualSync = () => {
        resizeComposeInput();
        scheduleComposeOverlaySync();
      };

      setUpperPopulatedState(false);
      window.requestAnimationFrame(() => {
        resizeComposeInput();
        scheduleComposeOverlaySync();
        updateComposeSubmitState();
        inputEl.focus();
        moveCaretToStart(inputEl);
      });
      persistViewState("compose");
    }
    
    /********************************
     * Render Lower Container (Selectable Sentences)
     ********************************/
     function renderLowerContainer() {
      const lowerContent = document.getElementById("lower-content");
      lowerContent.innerHTML = "";
      const labelEl = document.createElement("div");
      labelEl.className = "lower-content-label";
      labelEl.textContent = "-- Text with highlighted corrections --";
      lowerContent.appendChild(labelEl);
      const availablePx = Math.max(320, lowerContent.clientWidth || window.innerWidth);
      const approxCharPx = 11;
      const wrapColumns = Math.max(24, Math.floor((availablePx - 40) / approxCharPx));
      sentenceDataArray.forEach(sentence => {
          const renderFn = sentence.render_mode === "aligned_text"
            ? renderAlignedTextSentence
            : renderSentence;
          let sentenceEl = renderFn(sentence, {
            wrapColumns,
            fixedWidthFromData: false
          });
          sentenceEl.appendChild(createSeparatorLine());
          lowerContent.appendChild(sentenceEl);
          createHighlightBoxesForContainer(sentenceEl);
          updateSentenceDecorationExtent(sentenceEl);
      });
      clearComposeUiIfResultsPresent();
      syncEditMenuVisibilityFromLowerContent();
  }

    
    function renderCurrentWriting() {
      if (!authenticatedUser) {
        renderAuthView();
        return;
      }
      const appEl = document.getElementById("app");
      if (!Array.isArray(sentenceDataArray)) {
        console.error("No valid sentences found.");
        appEl.classList.remove("corrections-mode");
        setEditMenuVisibility(false);
        return;
      }
      exitComposeMode();
      appEl.classList.add("corrections-mode");
      syncPrintButtonVisibility();
      renderLowerContainer();
      scheduleUpperPanelAutoState();
      if (isEditMode) {
        renderOcrEditView();
      }
      persistViewState("corrections");
    }

    initMenu();
    initSidebarMenu();
    initLowerToggle();
    initPrintButton();
    fetchAuthStatus().then((status) => {
      const availableUsers = Array.isArray(status.available_users) ? status.available_users : [];
      if (availableUsers.length) {
        AUTH_USERS.length = 0;
        availableUsers.forEach((userName) => AUTH_USERS.push(userName));
      }
      authenticatedUser = status.authenticated ? status.user : null;
      syncAuthChrome();
      if (authenticatedUser) {
        restoreViewState(readViewState());
      } else {
        renderAuthView();
      }
      initUpperScrollAutoStick();
    });
    window.addEventListener("resize", () => {
      if (!authenticatedUser) {
        renderAuthView();
        return;
      }
      if (isComposeMode) {
        if (typeof composeVisualSync === "function") {
          composeVisualSync();
        }
        return;
      }
      renderCurrentWriting();
      scheduleUpperPanelAutoState();
    });
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        return;
      }
      if (isComposeMode && typeof mobileUploadRefreshFn === "function") {
        mobileUploadRefreshFn();
      }
    });
    window.addEventListener("beforeunload", () => {
      persistViewState();
    });
    window.addEventListener("focus", () => {
      if (isComposeMode && typeof mobileUploadRefreshFn === "function") {
        mobileUploadRefreshFn();
      }
    });
    
  </script>
</body>
</html>
