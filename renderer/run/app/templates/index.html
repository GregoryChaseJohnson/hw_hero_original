<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>hw-hero</title>
  <link rel="stylesheet" href="/static/themes.css" />
</head>
<body>
  <!-- Top bar -->
  <div id="theme-bar">
    <div id="hamburger-anchor">
      <button id="hamburger-toggle" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Open sidebar menu">
        <span class="line"></span>
        <span class="line middle"></span>
        <span class="line"></span>
      </button>
      <div id="sidebar-panel" hidden>
        <button id="sidebar-close" type="button" aria-label="Close sidebar menu">×</button>
        <button id="sidebar-new-entry" class="sidebar-item" type="button">
          <svg class="new-writing-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M8 3.5h8.2L20.5 7.8V20.5a1.5 1.5 0 0 1-1.5 1.5H8a1.5 1.5 0 0 1-1.5-1.5V5A1.5 1.5 0 0 1 8 3.5z"/>
            <path d="M16.2 3.5V8h4.3"/>
            <path d="M9.2 16.6l4.9-4.9 2.1 2.1-4.9 4.9-2.7.6z"/>
          </svg>
          <span class="label">New writing</span>
        </button>
        <div id="sidebar-auth-status" hidden>
          <div id="sidebar-auth-user"></div>
          <button id="sidebar-sign-out" type="button">Sign out</button>
        </div>
        <button id="sidebar-entry" class="sidebar-item" type="button">
          <span class="label">Your writings</span>
          <span class="caret">&gt;</span>
        </button>
        <div id="sidebar-writing-list"></div>
      </div>
    </div>
    <div id="brand-anchor">
      <div class="compose-wordmark" aria-label="hwHERO">
        <span class="compose-wordmark-part compose-wordmark-lower compose-wordmark-hw compose-wordmark-hw-shift">hw</span>
        <span class="compose-wordmark-gap" aria-hidden="true"></span>
        <span class="compose-wordmark-part compose-wordmark-h">H</span>
        <span class="compose-wordmark-e" aria-hidden="true"><span class="line"></span><span class="line middle"></span><span class="line"></span></span>
        <span class="compose-wordmark-part compose-wordmark-r">R</span>
        <span class="compose-wordmark-part compose-wordmark-o">O</span>
      </div>
    </div>
    <div id="writing-tabs-anchor"></div>
    <div id="print-anchor" hidden>
      <button id="print-button" type="button" aria-label="Print corrections view">Print</button>
    </div>
    <div id="menu-anchor" hidden>
      <button id="menu-toggle" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Open menu">
        <span class="menu-dot"></span>
        <span class="menu-dot"></span>
        <span class="menu-dot"></span>
      </button>
      <div id="menu-dropdown" hidden></div>
    </div>
  </div>
  <div id="sidebar-scrim" hidden></div>
  <!-- App containers -->
  <div id="app">
    <div id="upper-container" class="explanation-panel"><div id="upper-scroll-content"></div></div>
    <div id="lower-container" class="corrections-list">
        <div id="lower-header">
          <button id="lower-toggle" type="button" aria-label="Expand lower panel" title="Pull up lower panel">
            <svg class="chevron" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M6 14l6-6 6 6" />
            </svg>
          </button>
        </div>
        <div id="lower-content"></div> <!-- The rest of the lower container -->
    </div>
</div>
  <div id="print-preview" hidden>
    <div id="print-preview-toolbar">
      <div id="print-preview-page-count" aria-live="polite">0 pages</div>
      <div id="print-preview-actions">
        <button id="print-preview-close" type="button" aria-label="Close print preview">Close</button>
        <button id="print-preview-confirm" type="button" aria-label="Open browser print dialog">Print</button>
      </div>
    </div>
    <div id="print-preview-stage">
      <div id="print-preview-content"></div>
    </div>
  </div>

  <script>
    /********************************
     * Data fetching
     ********************************/
    async function fetchData() {
      try {
        const response = await fetch("/data.json");
        if (!response.ok) {
          console.error("Failed to fetch /data.json");
          return null;
        }
        return await response.json();
      } catch (err) {
        console.error("Error fetching data.json:", err);
        return null;
      }
    }

    async function fetchSentenceMapping() {
      try {
        const response = await fetch("/sentence_mapping.json");
        if (!response.ok) {
          console.error("Failed to fetch /sentence_mapping.json");
          return null;
        }
        return await response.json();
      } catch (err) {
        console.error("Error fetching sentence_mapping.json:", err);
        return null;
      }
    }

    function getUpperContainer() {
      return document.getElementById("upper-container");
    }

    function getUpperScrollContent() {
      return document.getElementById("upper-scroll-content");
    }

    async function fetchSavedWritings() {
      try {
        const response = await fetch("/saved_writings");
        if (!response.ok) {
          console.error("Failed to fetch /saved_writings");
          return [];
        }
        const data = await response.json();
        return Array.isArray(data.writings) ? data.writings : [];
      } catch (err) {
        console.error("Error fetching saved writings:", err);
        return [];
      }
    }

    async function fetchSavedWritingById(writingId) {
      try {
        const response = await fetch(`/saved_writings/${encodeURIComponent(writingId)}`);
        if (!response.ok) {
          console.error(`Failed to fetch saved writing ${writingId}`);
          return null;
        }
        return await response.json();
      } catch (err) {
        console.error("Error fetching saved writing:", err);
        return null;
      }
    }

    async function fetchAuthStatus() {
      try {
        const response = await fetch("/auth/status");
        if (!response.ok) {
          return { authenticated: false, user: null, available_users: [] };
        }
        return await response.json();
      } catch (err) {
        console.error("Error fetching auth status:", err);
        return { authenticated: false, user: null, available_users: [] };
      }
    }

    async function loginUser(user, password) {
      const response = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user, password }),
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(body.error || `Request failed (${response.status})`);
      }
      return body;
    }

    async function logoutUser() {
      const response = await fetch("/auth/logout", {
        method: "POST",
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(body.error || `Request failed (${response.status})`);
      }
      return body;
    }

    async function fetchMobileUploadQrUrl() {
      const response = await fetch("/auth/mobile_upload_qr");
      if (!response.ok) {
        const body = await response.json().catch(() => ({}));
        throw new Error(body.error || `Request failed (${response.status})`);
      }
      const blob = await response.blob();
      return URL.createObjectURL(blob);
    }

    async function fetchPendingMobileUpload() {
      const response = await fetch("/auth/pending_mobile_upload");
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(body.error || `Request failed (${response.status})`);
      }
      return body;
    }

    async function clearPendingMobileUpload() {
      const response = await fetch("/auth/pending_mobile_upload", {
        method: "DELETE",
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(body.error || `Request failed (${response.status})`);
      }
      return body;
    }

    async function processPendingMobileUpload() {
      const response = await fetch("/auth/pending_mobile_upload/process", {
        method: "POST",
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(body.error || body.details || `Request failed (${response.status})`);
      }
      return body;
    }

    /********************************
     * Rendering Functions for Sentence Lines
     ********************************/
    function displayChar(tokens, idx) {
      const token = tokens[idx] || {};
      const ch = token.char;
      if (ch !== '"') {
        return ch;
      }
      const prev = idx > 0 ? (tokens[idx - 1].char || "") : "";
      const next = idx + 1 < tokens.length ? (tokens[idx + 1].char || "") : "";
      const next2 = idx + 2 < tokens.length ? (tokens[idx + 2].char || "") : "";
      const isWordChar = c => /[A-Za-z0-9_]/.test(c);
      if (isWordChar(prev) && isWordChar(next)) {
        return "'";
      }
      // Plural possessive artifact: students" health -> students' health
      if ((prev === "s" || prev === "S") && next === " " && /[A-Za-z]/.test(next2)) {
        return "'";
      }
      return ch;
    }

    function tokenIsCorrected(token) {
      if (!token) return false;
      return (
        token.replacementBlockId !== undefined ||
        token.insertBlockId !== undefined ||
        token.deleteBlockId !== undefined
      );
    }

    function computeSharedSegments(sentence, maxCols) {
      const finalTokens = sentence.final_sentence_tokens || [];
      const annotatedTokens = sentence.annotated_tokens || [];
      const totalLen = Math.max(finalTokens.length, annotatedTokens.length);
      const width = Math.max(20, Number(maxCols) || totalLen || 20);
      if (totalLen === 0) return [[0, 0]];

      const charAt = (i) => {
        const fromFinal = finalTokens[i] && typeof finalTokens[i].char === "string" ? finalTokens[i].char : "";
        if (fromFinal) return fromFinal;
        const fromAnnotated = annotatedTokens[i] && typeof annotatedTokens[i].char === "string" ? annotatedTokens[i].char : "";
        return fromAnnotated || "";
      };
      const isWhitespace = (ch) => /\s/.test(ch || "");

      const correctedMask = new Array(totalLen).fill(false);
      for (let i = 0; i < totalLen; i += 1) {
        correctedMask[i] = tokenIsCorrected(finalTokens[i]) || tokenIsCorrected(annotatedTokens[i]);
      }

      const protectedSpans = [];
      let i = 0;
      while (i < totalLen) {
        if (!correctedMask[i]) {
          i += 1;
          continue;
        }
        const start = i;
        while (i < totalLen && correctedMask[i]) i += 1;
        protectedSpans.push([start, i]); // [start, end)
      }

      const insideProtectedSpan = (boundary) => {
        for (let s = 0; s < protectedSpans.length; s += 1) {
          const [start, end] = protectedSpans[s];
          if (boundary > start && boundary < end) return true;
        }
        return false;
      };

      const isSpaceBoundary = (boundary) => (
        boundary > 0 &&
        boundary <= totalLen &&
        isWhitespace(charAt(boundary - 1)) &&
        (boundary === totalLen || !isWhitespace(charAt(boundary)))
      );

      const chooseBreak = (start) => {
        if (start + width >= totalLen) return totalLen;
        const ideal = Math.min(start + width, totalLen - 1);

        // Greedy left scan: nearest prior space boundary, never inside protected spans.
        for (let b = ideal; b > start; b -= 1) {
          if (isSpaceBoundary(b) && !insideProtectedSpan(b)) {
            return b;
          }
        }

        // Fallback only when no left-space boundary exists: scan right for next space boundary.
        for (let b = ideal + 1; b <= totalLen; b += 1) {
          if (isSpaceBoundary(b) && !insideProtectedSpan(b)) {
            return b;
          }
        }

        // Hard fallback: no spaces available in remaining span (single long run).
        let hard = Math.min(start + width, totalLen);
        while (hard < totalLen && insideProtectedSpan(hard)) hard += 1;
        if (hard <= start) hard = Math.min(start + 1, totalLen);
        return hard;
      };

      const segments = [];
      let start = 0;
      while (start < totalLen) {
        let end = chooseBreak(start);
        if (end <= start) {
          end = Math.min(start + width, totalLen);
        }
        segments.push([start, end]);
        start = end;
      }
      return segments;
    }

    function computePlainTextSegments(text, maxCols) {
      const value = text || "";
      const width = Math.max(20, Number(maxCols) || value.length || 20);
      if (value.length === 0) return [[0, 0]];

      const isWhitespace = (ch) => /\s/.test(ch || "");
      const isSpaceBoundary = (boundary) => (
        boundary > 0 &&
        boundary <= value.length &&
        isWhitespace(value[boundary - 1]) &&
        (boundary === value.length || !isWhitespace(value[boundary]))
      );

      const chooseBreak = (start) => {
        if (start + width >= value.length) return value.length;
        const ideal = Math.min(start + width, value.length - 1);
        for (let b = ideal; b > start; b -= 1) {
          if (isSpaceBoundary(b)) return b;
        }
        for (let b = ideal + 1; b <= value.length; b += 1) {
          if (isSpaceBoundary(b)) return b;
        }
        return Math.min(start + width, value.length);
      };

      const segments = [];
      let start = 0;
      while (start < value.length) {
        let end = chooseBreak(start);
        if (end <= start) end = Math.min(start + width, value.length);
        segments.push([start, end]);
        start = end;
      }
      return segments;
    }

    function renderFinalLine(sentence, container, segment, rowIndex) {
      const finalLine = document.createElement("div");
      finalLine.className = "final-line sentence-line sentence-line-top";
      container.appendChild(finalLine);
      const tokens = sentence.final_sentence_tokens || [];
      const noStrikeReplacementBlockIds = new Set(
        (sentence.replacement_blocks || [])
          .filter(block => typeof block.replaced_text === "string" && block.replaced_text.trim().length === 0)
          .map(block => String(block.block_index))
      );
      const insertBlockRanges = new Map(
        (sentence.insert_blocks || []).map(block => [
          String(block.insert_block_index),
          { start: block.final_start, end: block.final_end }
        ])
      );

      const [start, end] = segment;
      for (let idx = start; idx < end; idx += 1) {
        const token = tokens[idx];
        const span = document.createElement("span");
        span.className = "token " + ((token && token.type) || "");
        const shownChar = displayChar(tokens, idx);
        span.textContent = shownChar === " " ? "\u00A0" : shownChar;
        span.dataset.index = token ? token.index : idx;
        span.dataset.sentenceIdx = sentence.sentence_index;
        span.dataset.rowIndex = String(rowIndex);
        if (token && token.replacementBlockId !== undefined) {
          span.dataset.replacementBlockId = token.replacementBlockId;
          const prev = idx > 0 ? tokens[idx - 1] : null;
          const next = idx + 1 < tokens.length ? tokens[idx + 1] : null;
          const replacementBlockId = String(token.replacementBlockId);
          const isReplacementBoundarySpace = (
            token.char === " " &&
            (
              !prev ||
              String(prev.replacementBlockId) !== replacementBlockId ||
              !next ||
              String(next.replacementBlockId) !== replacementBlockId
            )
          );
          if (noStrikeReplacementBlockIds.has(replacementBlockId) || isReplacementBoundarySpace) {
            span.classList.add("no-strike");
          }
        }
        if (token && token.insertBlockId !== undefined) {
          const blockId = String(token.insertBlockId);
          const range = insertBlockRanges.get(blockId);
          const prev = idx > 0 ? tokens[idx - 1] : null;
          const next = idx + 1 < tokens.length ? tokens[idx + 1] : null;
          const isBoundarySpace = (
            token.char === " " &&
            range &&
            (
              (idx === range.start && prev && prev.type === "equal") ||
              (idx === range.end && next && next.type === "equal")
            )
          );
          if (!isBoundarySpace) {
            span.dataset.insertBlockId = token.insertBlockId;
          }
        }
        if (token && token.deleteBlockId !== undefined) {
          span.dataset.deleteBlockId = token.deleteBlockId;
        }
        finalLine.appendChild(span);
      }
    }
    
    function renderAnnotatedLine(sentence, container, segment, rowIndex) {
      const annotatedLine = document.createElement("div");
      annotatedLine.className = "annotated-line sentence-line sentence-line-bottom";
      container.appendChild(annotatedLine);
      const tokens = sentence.annotated_tokens || [];

      const [start, end] = segment;
      for (let idx = start; idx < end; idx += 1) {
        const token = tokens[idx];
        const span = document.createElement("span");
        span.className = "corrected-char";
        const shownChar = displayChar(tokens, idx);
        span.textContent = shownChar === " " ? "\u00A0" : shownChar;
        span.dataset.index = token ? token.index : idx;
        span.dataset.sentenceIdx = sentence.sentence_index;
        span.dataset.rowIndex = String(rowIndex);
        if (token && token.replacementBlockId !== undefined) {
          span.dataset.replacementBlockId = token.replacementBlockId;
        }
        annotatedLine.appendChild(span);
      }
    }

    function sentenceGroupsFromText(text) {
      const value = text || "";
      const spans = [];
      const regex = /[^.!?]+[.!?]+|[^.!?]+$/g;
      let match;
      while ((match = regex.exec(value)) !== null) {
        const raw = match[0];
        const trimmedStart = raw.match(/^\s*/)?.[0]?.length || 0;
        const trimmedEnd = raw.match(/\s*$/)?.[0]?.length || 0;
        const start = match.index + trimmedStart;
        const end = match.index + raw.length - trimmedEnd;
        if (end > start) {
          spans.push([start, end]);
        }
      }
      return spans.length ? spans : [[0, value.length]];
    }

    function alignedGroupIdAtIndex(groups, idx) {
      for (let i = 0; i < groups.length; i += 1) {
        const [start, end] = groups[i];
        if (idx >= start && idx < end) return String(i);
      }
      return null;
    }

    function renderPlainTextLine(text, container, className, segment, rowIndex, sentenceIndex, options = {}) {
      const line = document.createElement("div");
      const roleClass = className === "final-line" ? "sentence-line-top" : "sentence-line-bottom";
      line.className = `${className} sentence-line ${roleClass}`;
      container.appendChild(line);
      const alignedLineRole = className === "final-line" ? "ocr" : "corrected";
      const groups = Array.isArray(options.groups) ? options.groups : [];

      const [start, end] = segment;
      for (let idx = start; idx < end; idx += 1) {
        const span = document.createElement("span");
        span.className = className === "final-line" ? "token equal" : "corrected-char";
        const shownChar = text[idx] || "";
        span.textContent = shownChar === " " ? "\u00A0" : shownChar;
        span.dataset.index = idx;
        span.dataset.sentenceIdx = sentenceIndex;
        span.dataset.rowIndex = String(rowIndex);
        span.dataset.alignedLineRole = alignedLineRole;
        if (groups.length) {
          const groupId = alignedGroupIdAtIndex(groups, idx);
          if (groupId !== null) {
            span.dataset.alignedGroupId = groupId;
          }
        }
        line.appendChild(span);
      }
    }
    
    // Renders a sentence into a container element.
    function attachSentenceMetadata(container, sentence) {
      container.dataset.sentenceIndex = sentence.sentence_index;
      if (sentence.source_sentence_index !== undefined && sentence.source_sentence_index !== null) {
        container.dataset.sourceSentenceIndex = sentence.source_sentence_index;
      }
      if (sentence.correction_mode) {
        container.dataset.correctionMode = sentence.correction_mode;
      }
      if (sentence.combined_scope_side) {
        container.dataset.combinedScopeSide = sentence.combined_scope_side;
      }
      container.dataset.isCombinedScope = sentence.is_combined_scope ? "true" : "false";
      if (sentence.render_mode) {
        container.dataset.renderMode = sentence.render_mode;
      }
    }

    function renderSentence(sentence, options = {}) {
      const container = document.createElement("div");
      container.className = "sentence-container";
      if (options.fixedWidthFromData !== false && typeof sentence.container_length === "number") {
        container.style.width = sentence.container_length + "ch";
      }
      attachSentenceMetadata(container, sentence);
      const maxCols = options.wrapColumns || null;
      const segments = computeSharedSegments(sentence, maxCols);
      segments.forEach((segment, rowIndex) => {
        renderFinalLine(sentence, container, segment, rowIndex);
        renderAnnotatedLine(sentence, container, segment, rowIndex);
      });
      if (options.interactive !== false) {
        attachContainerClickHandler(container);
        attachContainerHoverHandler(container);
      }
      return container;
    }

    function renderAlignedTextSentence(sentence, options = {}) {
      const container = document.createElement("div");
      container.className = "sentence-container aligned-text-sentence";
      if (options.fixedWidthFromData !== false && typeof sentence.container_length === "number") {
        container.style.width = sentence.container_length + "ch";
      }
      attachSentenceMetadata(container, sentence);
      const maxCols = options.wrapColumns || null;
      const ocrText = sentence.ocr_text || "";
      const correctedText = sentence.corrected_text || "";
      const ocrGroups = sentenceGroupsFromText(ocrText);
      const ocrSegments = computePlainTextSegments(ocrText, maxCols);
      const correctedSegments = computePlainTextSegments(correctedText, maxCols);
      let rowIndex = 0;
      ocrSegments.forEach((segment) => {
        renderPlainTextLine(ocrText, container, "final-line", segment, rowIndex, sentence.sentence_index, { groups: ocrGroups });
        rowIndex += 1;
      });
      correctedSegments.forEach((segment) => {
        renderPlainTextLine(correctedText, container, "annotated-line", segment, rowIndex, sentence.sentence_index);
        rowIndex += 1;
      });
      return container;
    }

    function renderDisplaySentencePreview(sentence) {
      if (!sentence) return null;
      const upperContainer = getUpperContainer();
      const previewEl = document.createElement("div");
      previewEl.className = "explanation-sentence-preview";
      const renderFn = sentence.render_mode === "aligned_text"
        ? renderAlignedTextSentence
        : renderSentence;
      const availablePx = Math.max(320, upperContainer.clientWidth || window.innerWidth);
      const approxCharPx = 11;
      const wrapColumns = Math.max(24, Math.floor((availablePx - 40) / approxCharPx));
      const sentenceEl = renderFn(sentence, {
        wrapColumns,
        fixedWidthFromData: false,
        interactive: false,
      });
      previewEl.appendChild(sentenceEl);
      return previewEl;
    }

    function markPreviewCorrection(container, payload) {
      if (!container || !payload) return;
      const blockType = payload.blockType;
      const blockIndex = String(payload.blockIndex);
      if (!blockType || !blockIndex) return;
      const selector = `.highlight-box[data-${blockType}-block-id='${blockIndex}']`;
      container.querySelectorAll(selector).forEach((box) => {
        box.classList.add("hovered");
      });
    }

    function keepOnlyPreviewHighlightBox(container, payload) {
      if (!container || !payload) return;
      const blockType = payload.blockType;
      const blockIndex = String(payload.blockIndex);
      if (!blockType || !blockIndex) return;
      const keepSelector = `.highlight-box[data-${blockType}-block-id='${blockIndex}']`;
      container.querySelectorAll(".highlight-box").forEach((box) => {
        if (!box.matches(keepSelector)) {
          box.remove();
        }
      });
    }

    function renderCorrectionResponseIntoHost(hostEl, response, payload) {
      if (!hostEl) return;
      const explanation = response.explanation || "";
      const koreanExplanation = response.korean_explanation || "";
      const entryEl = hostEl.querySelector(".correction-history-entry.is-pending") || document.createElement("div");
      entryEl.className = "correction-history-entry";
      entryEl.innerHTML = "";

      const explanationLabelEl = document.createElement("div");
      explanationLabelEl.className = "full-writing-correction-label";
      explanationLabelEl.textContent = "-- Correction explanation --";
      entryEl.appendChild(explanationLabelEl);

      const explanationDividerEl = document.createElement("div");
      explanationDividerEl.className = "explanation-separator correction-explanation-separator";
      entryEl.appendChild(explanationDividerEl);

      const previewEl = renderDisplaySentencePreview(response.display_sentence);
      if (previewEl) {
        entryEl.appendChild(previewEl);
        const sentenceEl = previewEl.querySelector(".sentence-container");
        if (sentenceEl) {
          createHighlightBoxesForContainer(sentenceEl);
          keepOnlyPreviewHighlightBox(sentenceEl, payload);
          updateSentenceDecorationExtent(sentenceEl);
          markPreviewCorrection(sentenceEl, payload);
        }
      }

      const explanationEl = document.createElement("div");
      explanationEl.className = "explanation-response";
      explanationEl.innerHTML = explanation
        ? applySafeQuoteHighlight(explanation)
        : "No explanation returned by backend.";
      entryEl.appendChild(explanationEl);

      if (koreanExplanation) {
        const koreanSeparatorEl = createSeparatorLine();
        koreanSeparatorEl.classList.add("explanation-separator");
        entryEl.appendChild(koreanSeparatorEl);

        const koreanToggleEl = document.createElement("button");
        koreanToggleEl.type = "button";
        koreanToggleEl.className = "korean-explanation-toggle";
        koreanToggleEl.setAttribute("aria-expanded", "false");
        koreanToggleEl.innerHTML = `

    function scrollUpperContainerToBottomIfNeeded(behavior = "smooth") {
      const upperScroller = getUpperScrollContent();

      const distanceFromBottom = upperScroller.scrollHeight - upperScroller.scrollTop - upperScroller.clientHeight;
      if (distanceFromBottom <= 12) {
        return;
      }
      upperScroller.scrollTo({
        top: upperScroller.scrollHeight,
        behavior,
      });

    function scheduleScrollUpperContainerToBottom(behavior = "auto") {
      if (isRestoringViewState) return;
      const upperScroller = getUpperScrollContent();
      if (!upperScroller) return;
      window.requestAnimationFrame(() => {
        const liveScroller = getUpperScrollContent();
        if (!liveScroller || isRestoringViewState) return;
        liveScroller.scrollTop = liveScroller.scrollHeight;
        if (behavior === "smooth") {
          liveScroller.scrollTo({ top: liveScroller.scrollHeight, behavior: "smooth" });

    function updateSentenceDecorationExtent(container) {
      const contentEls = container.querySelectorAll(".sentence-line .token, .sentence-line .corrected-char");
      if (!contentEls.length) {
        container.style.removeProperty("--sentence-decoration-width");
        container.style.removeProperty("--sentence-decoration-anchor-bottom");
        return;
      }

      const containerRect = container.getBoundingClientRect();
      let maxRight = 0;
      contentEls.forEach((el) => {
        const rect = el.getBoundingClientRect();
        maxRight = Math.max(maxRight, rect.right - containerRect.left);
      });

      const leftInsetValue = getComputedStyle(document.documentElement).getPropertyValue("--sep-left-margin").trim();
      const leftInset = Number.parseFloat(leftInsetValue) || 0;
      const decorationWidth = Math.max(0, Math.ceil(maxRight - leftInset));
      container.style.setProperty("--sentence-decoration-width", `${decorationWidth}px`);

      const lineEls = Array.from(container.querySelectorAll(".sentence-line"));
      let maxBottom = 0;
      lineEls.forEach((el) => {
        const rect = el.getBoundingClientRect();
        maxBottom = Math.max(maxBottom, rect.bottom - containerRect.top);
      });
      const styles = getComputedStyle(container);
      const paddingBottom = Number.parseFloat(styles.paddingBottom) || 0;
      const anchorBottom = Math.max(0, Math.ceil(containerRect.height - maxBottom - paddingBottom));
      container.style.setProperty("--sentence-decoration-anchor-bottom", `${anchorBottom}px`);
    }
    
    /********************************
     * Highlight Box Functions
     ********************************/
    function createBoxForLine(container, blockId, blockType, lineSelector) {
      const allEls = container.querySelectorAll(
        `${lineSelector}[data-${blockType}-block-id='${blockId}']`
      );
      if (!allEls.length) return;
      const byRow = new Map();
      allEls.forEach(el => {
        const row = el.dataset.rowIndex || "0";
        if (!byRow.has(row)) byRow.set(row, []);
        byRow.get(row).push(el);
      });

      const containerRect = container.getBoundingClientRect();
      byRow.forEach(rowEls => {
        let minLeft = Infinity, maxRight = -Infinity;
        let minTop = Infinity, maxBottom = -Infinity;
        rowEls.forEach(el => {
          const rect = el.getBoundingClientRect();
          const left = rect.left - containerRect.left;
          const right = rect.right - containerRect.left;
          const top = rect.top - containerRect.top;
          const bottom = rect.bottom - containerRect.top;
          minLeft = Math.min(minLeft, left);
          maxRight = Math.max(maxRight, right);
          minTop = Math.min(minTop, top);
          maxBottom = Math.max(maxBottom, bottom);
        });
        const margin = 0.8;
        const boxLeft = minLeft - margin;
        const boxTop = minTop - margin;
        const boxWidth = (maxRight - minLeft) + margin * 2;
        const boxHeight = (maxBottom - minTop) + margin * 2;
        if (boxWidth <= 0 || boxHeight <= 0) return;
        const highlightBox = document.createElement("div");
        highlightBox.className = "highlight-box";
        highlightBox.dataset[`${blockType}BlockId`] = blockId;
        highlightBox.dataset.blockType = blockType;
        highlightBox.dataset.blockIndex = blockId;
        highlightBox.dataset.sentenceIndex = container.dataset.sentenceIndex;
        highlightBox.style.left = `${boxLeft}px`;
        highlightBox.style.top = `${boxTop}px`;
        highlightBox.style.width = `${boxWidth}px`;
        highlightBox.style.height = `${boxHeight}px`;
        highlightBox.style.zIndex = "1";
        container.appendChild(highlightBox);
      });
    }
    
    function createHighlightBoxesForContainer(container) {
      if (container.classList.contains("aligned-text-sentence")) {
        createBoxForAlignedLine(container, "ocr", true);
        createBoxForAlignedLine(container, "corrected", false);
        return;
      }
      const blockTypes = ["replacement", "insert", "delete"];
      blockTypes.forEach(blockType => {
        const tokens = container.querySelectorAll(`.final-line [data-${blockType}-block-id]`);
        const blockIds = new Set();
        tokens.forEach(token => {
          blockIds.add(token.dataset[`${blockType}BlockId`]);
        });
        blockIds.forEach(blockId => {
          if (blockType === "replacement") {
            createBoxForLine(container, blockId, blockType, ".final-line .token");
            createBoxForLine(container, blockId, blockType, ".annotated-line .corrected-char");
          } else {
            createBoxForLine(container, blockId, blockType, ".final-line .token");
          }
        });
      });
    }

    function createBoxForAlignedLine(container, lineRole, splitByGroup) {
      const selector = splitByGroup
        ? `[data-aligned-line-role='${lineRole}'][data-aligned-group-id]`
        : `[data-aligned-line-role='${lineRole}']`;
      const allEls = container.querySelectorAll(selector);
      if (!allEls.length) return;
      const groupedEls = new Map();
      allEls.forEach((el) => {
        const row = el.dataset.rowIndex || "0";
        const groupId = splitByGroup ? (el.dataset.alignedGroupId || "0") : "all";
        const key = `${groupId}:${row}`;
        if (!groupedEls.has(key)) groupedEls.set(key, []);
        groupedEls.get(key).push(el);
      });

      const containerRect = container.getBoundingClientRect();
      groupedEls.forEach((rowEls) => {
        const measurableEls = rowEls.filter((el) => /\S/.test((el.textContent || "").replace(/\u00A0/g, " ")));
        if (!measurableEls.length) return;
        let minLeft = Infinity, maxRight = -Infinity;
        let minTop = Infinity, maxBottom = -Infinity;
        measurableEls.forEach((el) => {
          const rect = el.getBoundingClientRect();
          const left = rect.left - containerRect.left;
          const right = rect.right - containerRect.left;
          const top = rect.top - containerRect.top;
          const bottom = rect.bottom - containerRect.top;
          minLeft = Math.min(minLeft, left);
          maxRight = Math.max(maxRight, right);
          minTop = Math.min(minTop, top);
          maxBottom = Math.max(maxBottom, bottom);
        });

        const highlightBox = document.createElement("div");
        highlightBox.className = "highlight-box";
        highlightBox.dataset.alignedLineRole = lineRole;
        highlightBox.style.left = `${minLeft}px`;
        highlightBox.style.top = `${minTop}px`;
        highlightBox.style.width = `${Math.max(0, maxRight - minLeft)}px`;
        highlightBox.style.height = `${Math.max(0, maxBottom - minTop)}px`;
        highlightBox.style.zIndex = "1";
        container.appendChild(highlightBox);
      });
    }
    
    /********************************
     * Event Delegation for Clicks and Hovers
     ********************************/
    function attachContainerClickHandler(container) {
      container.addEventListener("click", function(e) {
        let target = e.target;
        while (target && target !== container) {
          if (target.classList.contains("highlight-box") && target.dataset.blockType && target.dataset.blockIndex !== undefined) {
            setSelectedLowerSentenceContainer(container);
            handleHighlightClick({
              blockType: target.dataset.blockType,
              blockIndex: target.dataset.blockIndex,
              sentenceIndex: target.dataset.sentenceIndex || container.dataset.sentenceIndex
            });
            return;
          }
          if (target.dataset.replacementBlockId !== undefined) {
            setSelectedLowerSentenceContainer(container);
            handleHighlightClick({
              blockType: "replacement",
              blockIndex: target.dataset.replacementBlockId,
              sentenceIndex: container.dataset.sentenceIndex
            });
            return;
          }
          if (target.dataset.insertBlockId !== undefined) {
            setSelectedLowerSentenceContainer(container);
            handleHighlightClick({
              blockType: "insert",
              blockIndex: target.dataset.insertBlockId,
              sentenceIndex: container.dataset.sentenceIndex
            });
            return;
          }
          if (target.dataset.deleteBlockId !== undefined) {
            setSelectedLowerSentenceContainer(container);
            handleHighlightClick({
              blockType: "delete",
              blockIndex: target.dataset.deleteBlockId,
              sentenceIndex: container.dataset.sentenceIndex
            });
            return;
          }
          target = target.parentNode;
        }
      });
    }
    
    function attachContainerHoverHandler(container) {
      container.addEventListener("mouseover", function(e) {
        let target = e.target;
        while (target && target !== container) {
          if (target.dataset.replacementBlockId !== undefined) {
            const blockId = target.dataset.replacementBlockId;
            const relatedBoxes = container.querySelectorAll(`.highlight-box[data-replacement-block-id='${blockId}']`);
            relatedBoxes.forEach(box => box.classList.add("hovered"));
            break;
          }
          if (target.dataset.insertBlockId !== undefined) {
            const blockId = target.dataset.insertBlockId;
            const relatedBoxes = container.querySelectorAll(`.highlight-box[data-insert-block-id='${blockId}']`);
            relatedBoxes.forEach(box => box.classList.add("hovered"));
            break;
          }
          if (target.dataset.deleteBlockId !== undefined) {
            const blockId = target.dataset.deleteBlockId;
            const relatedBoxes = container.querySelectorAll(`.highlight-box[data-delete-block-id='${blockId}']`);
            relatedBoxes.forEach(box => box.classList.add("hovered"));
            break;
          }
          target = target.parentNode;
        }
      });
      
      container.addEventListener("mouseout", function() {
        const hoveredBoxes = container.querySelectorAll(".highlight-box.hovered");
        hoveredBoxes.forEach(box => box.classList.remove("hovered"));
      });
    }
    
    function escapeHtml(text) {
      return (text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function applySafeQuoteHighlight(explanation) {
      const safeExplanation = escapeHtml(explanation || "");
      const quoteRegex = /"([^"\n]{1,300})"/g;
      const boldRegex = /\*\*([^*\n]{1,300})\*\*/g;

      return safeExplanation
        .replace(quoteRegex, (fullMatch, innerText) => {
          return `<span class="highlighted-word">"${innerText}"</span>`;
        })
        .replace(boldRegex, (fullMatch, innerText) => {
          return `<span class="highlighted-word">**${innerText}**</span>`;
        });
    }

    function handleHighlightClick(payload) {
      console.log("Highlight clicked:", payload);
      const upperContainer = document.getElementById("upper-container");
      const correctionHostEl = upperContainer.querySelector(".full-writing-correction-embed");
      isEditMode = false;
      activeReadingTab = null;
      upperContainer.classList.remove("ocr-edit-mode");
      if (correctionHostEl) {
        createPendingCorrectionEntry(correctionHostEl);
      }
      
      fetch('/highlight_click', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ...payload,
          writingId: activeWritingId
        })
      })
      .then(async res => {
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          const msg = body.error || `Request failed (${res.status})`;
          throw new Error(msg);
        }
        return body;
      })
      .then(response => {
        console.log('Highlight click response:', response);
        renderCorrectionResponseIntoHost(correctionHostEl, response, payload);
        scheduleUpperPanelAutoState();

      })
      .catch(err => {
        console.error('Error in highlight click:', err);
        if (correctionHostEl) {
          clearPendingCorrectionEntry(correctionHostEl);
          const errorEl = document.createElement("div");
          errorEl.className = "explanation-response correction-error-response";
          errorEl.textContent = `Explanation error: ${err.message}`;
          if (getCorrectionHistoryItemCount(correctionHostEl) > 0) {
            correctionHostEl.appendChild(createSeparatorLine());
          }
          correctionHostEl.appendChild(errorEl);
        }
        scheduleUpperPanelAutoState();
      });
    }

    function cloneSerializable(value) {
      if (value === null || value === undefined) return value;
      try {
        return JSON.parse(JSON.stringify(value));
      } catch (err) {
        return null;
      }
    }

    function readViewState() {
      try {
        const raw = window.localStorage.getItem(VIEW_STATE_STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return null;
        return parsed;
      } catch (err) {
        console.error("failed to read view state:", err);
        return null;
      }
    }

    function writeViewState(state) {
      try {
        window.localStorage.setItem(VIEW_STATE_STORAGE_KEY, JSON.stringify(state));
      } catch (err) {
        console.error("failed to write view state:", err);
      }
    }

    function captureViewState(modeOverride = null) {
      const upperScroller = getUpperScrollContent();
      const appEl = document.getElementById("app");
      const correctionHostEl = document.querySelector(".full-writing-correction-embed");
      const mode = modeOverride || (
        !authenticatedUser ? "auth" :
        isComposeMode || appEl.classList.contains("compose-mode") ? "compose" :
        "corrections"
      );
      return {
        mode,
        writingId: activeWritingId || null,
        lowerExpanded: Boolean(isLowerExpanded),
        upperScrollTop: upperScroller ? upperScroller.scrollTop : 0,
        correctionHistory: mode === "corrections" ? captureCorrectionHistory(correctionHostEl) : [],
      };
    }

    function persistViewState(modeOverride = null) {
      if (isRestoringViewState) return;
      writeViewState(captureViewState(modeOverride));
    }

    function restoreScrollTop(scrollTop) {
      const upperScroller = getUpperScrollContent();
      if (!upperScroller) return;
      upperScroller.scrollTop = Math.max(0, scrollTop || 0);
    }

    function captureCorrectionHistory(hostEl) {
      if (!hostEl) return [];
      return Array.from(hostEl.querySelectorAll(".correction-history-entry"))
        .map((entryEl) => entryEl._correctionRecord || null)
        .filter(Boolean)
        .map((record) => ({
          response: cloneSerializable(record.response) || {},
          payload: cloneSerializable(record.payload) || {},
        }));
    }

    function replayCorrectionHistory(hostEl, history) {
      if (!hostEl || !Array.isArray(history) || !history.length) return;
      hostEl.innerHTML = "";
      history.forEach((record) => {
        if (!record || !record.response) return;
        renderCorrectionResponseIntoHost(
          hostEl,
          cloneSerializable(record.response) || {},
          cloneSerializable(record.payload) || {},
        );
      });
    }

    function restoreViewState(state) {
      const viewState = state || readViewState();
      if (!viewState || !authenticatedUser) {
        if (authenticatedUser) {
          renderNewWritingHome();
        } else {
          renderAuthView();
        }
        return;
      }

      isRestoringViewState = true;
      suppressAutoLowerExpand = true;
      const finishRestore = () => {
        isLowerExpanded = Boolean(viewState.lowerExpanded);
        applyPanelState();
        if (pendingRestoredViewState && Array.isArray(pendingRestoredViewState.correctionHistory)) {
          const correctionHostEl = document.querySelector(".full-writing-correction-embed");
          replayCorrectionHistory(correctionHostEl, pendingRestoredViewState.correctionHistory);
        }
        window.requestAnimationFrame(() => {
          restoreScrollTop(viewState.upperScrollTop);
          window.requestAnimationFrame(() => {
            restoreScrollTop(viewState.upperScrollTop);
            suppressAutoLowerExpand = false;
            isRestoringViewState = false;
            pendingRestoredViewState = null;
            persistViewState("corrections");
          });
        });
      };

      if (viewState.mode === "corrections" && viewState.writingId) {
        pendingRestoredViewState = viewState;
        openSavedWriting(viewState.writingId).then((didOpen) => {
          if (didOpen) {
            finishRestore();
          } else {
            suppressAutoLowerExpand = false;
            isRestoringViewState = false;
            pendingRestoredViewState = null;
            renderNewWritingHome();
          }
        });
        return;
      }

      if (viewState.mode === "compose") {
        renderNewWritingHome();
        window.requestAnimationFrame(() => {
          restoreScrollTop(viewState.upperScrollTop);
          window.requestAnimationFrame(() => {
            restoreScrollTop(viewState.upperScrollTop);
            suppressAutoLowerExpand = false;
            isRestoringViewState = false;
            persistViewState("compose");
          });
        });
        return;
      }

      isRestoringViewState = false;
      renderAuthView();
    }

    function buildTextFromSentenceMapping(mappingArray, fieldName) {
      if (!Array.isArray(mappingArray)) return "";
      return mappingArray
        .map(item => ((item && item[fieldName]) || "").trim())
        .filter(Boolean)
        .join(" ");
    }

    function getRecordSourceText(record) {
      if (!record) return "";
      const mapping = record.sentence_mapping && Array.isArray(record.sentence_mapping.sentences)
        ? record.sentence_mapping.sentences
        : [];
      return record.submitted_text || buildTextFromSentenceMapping(mapping, "ocr_sentence");
    }

    function getRecordCorrectedText(record) {
      if (!record) return "";
      const mapping = record.sentence_mapping && Array.isArray(record.sentence_mapping.sentences)
        ? record.sentence_mapping.sentences
        : [];
      return record.corrected_text || buildTextFromSentenceMapping(mapping, "corrected_sentence");
    }

    function renderPrintPreviewSentence(sentence, wrapColumns) {
      const renderFn = sentence.render_mode === "aligned_text"
        ? renderAlignedTextSentence
        : renderSentence;
      return renderFn(sentence, {
        wrapColumns,
        fixedWidthFromData: false,
        interactive: false,
      });
    }

    function measurePrintPreviewWrapColumns(previewContent) {
      previewContent.innerHTML = "";
      previewContent.className = "print-density-default";

      const pageEl = document.createElement("section");
      pageEl.className = "print-preview-page print-preview-measurement-page";
      const pageContentEl = document.createElement("div");
      pageContentEl.className = "print-preview-page-content print-preview-sheet-root";
      const sentenceEl = document.createElement("div");
      sentenceEl.className = "sentence-container";
      const lineEl = document.createElement("div");
      lineEl.className = "final-line sentence-line sentence-line-top";
      const tokenEl = document.createElement("span");
      tokenEl.className = "token equal";
      tokenEl.textContent = "0";
      lineEl.appendChild(tokenEl);
      sentenceEl.appendChild(lineEl);
      pageContentEl.appendChild(sentenceEl);
      pageEl.appendChild(pageContentEl);
      previewContent.appendChild(pageEl);

      const lineStyles = getComputedStyle(lineEl);
      const availableWidth = lineEl.clientWidth
        - (Number.parseFloat(lineStyles.paddingLeft) || 0)
        - (Number.parseFloat(lineStyles.paddingRight) || 0);
      const tokenWidth = tokenEl.getBoundingClientRect().width || 1;

      previewContent.innerHTML = "";
      return Math.max(20, Math.floor(availableWidth / tokenWidth));
    }

    function buildPrintPreview() {
      const previewContent = document.getElementById("print-preview-content");
      if (!previewContent) return;

      previewContent.innerHTML = "";
      const wrapColumns = measurePrintPreviewWrapColumns(previewContent);

      function paginatePreview(densityMode) {
        previewContent.innerHTML = "";
        previewContent.className = densityMode === "compressed"
          ? "print-density-compressed"
          : "print-density-default";
        if (!Array.isArray(sentenceDataArray) || !sentenceDataArray.length) {
          return 0;
        }

        let pageNumber = 0;

        function createPage() {
          pageNumber += 1;
          const pageEl = document.createElement("section");
          pageEl.className = "print-preview-page";
          pageEl.dataset.pageNumber = String(pageNumber);
          const pageContentEl = document.createElement("div");
          pageContentEl.className = "print-preview-page-content print-preview-sheet-root";
          pageEl.appendChild(pageContentEl);
          previewContent.appendChild(pageEl);
          return pageContentEl;
        }

        let currentPageContent = createPage();
        sentenceDataArray.forEach((sentence) => {
          const blockEl = renderPrintPreviewSentence(sentence, wrapColumns);
          currentPageContent.appendChild(blockEl);
          updateSentenceDecorationExtent(blockEl);
          if (currentPageContent.scrollHeight > currentPageContent.clientHeight + 1 && currentPageContent.childElementCount > 1) {
            currentPageContent.removeChild(blockEl);
            currentPageContent = createPage();
            currentPageContent.appendChild(blockEl);
            updateSentenceDecorationExtent(blockEl);
          }
        });

        return pageNumber;
      }

      let pageCount = paginatePreview("default");
      if (pageCount > 1) {
        pageCount = paginatePreview("compressed");
      }
      updatePrintPreviewPageCount(pageCount);
    }

    function initLowerToggle() {
      const toggleSurface = document.getElementById("lower-header");
      let expandPinFrameId = null;
      let expandPinFallbackId = null;
      const stopExpandPin = () => {
        if (expandPinFrameId !== null) {
          window.cancelAnimationFrame(expandPinFrameId);
          expandPinFrameId = null;
        }
        if (expandPinFallbackId !== null) {
          window.clearTimeout(expandPinFallbackId);
          expandPinFallbackId = null;
        }
        const upperScroller = getUpperScrollContent();
        if (upperScroller) {
          upperScroller.style.overflowAnchor = "";
        }
      };
      const pinUpperToBottomDuringExpand = () => {
        const appEl = document.getElementById("app");
        const upperScroller = getUpperScrollContent();
        if (!appEl || !upperScroller) return;

        stopExpandPin();
        upperScroller.style.overflowAnchor = "none";
        upperScroller.scrollTop = upperScroller.scrollHeight;

        const tick = () => {
          const liveScroller = getUpperScrollContent();
          if (!liveScroller) {
            stopExpandPin();
            return;
          }
          liveScroller.scrollTop = liveScroller.scrollHeight;
          expandPinFrameId = window.requestAnimationFrame(tick);
        };

        const finish = () => {
          appEl.removeEventListener("transitionend", onTransitionEnd);
          const liveScroller = getUpperScrollContent();
          stopExpandPin();
          if (liveScroller) {
            liveScroller.scrollTop = liveScroller.scrollHeight;
          }
        };

        const onTransitionEnd = (event) => {
          if (
            event.target !== appEl ||
            (event.propertyName !== "flex-basis" && event.propertyName !== "margin-bottom")
          ) {
            return;
          }
          finish();
        };

        appEl.addEventListener("transitionend", onTransitionEnd);
        expandPinFrameId = window.requestAnimationFrame(tick);
        expandPinFallbackId = window.setTimeout(finish, 260);
      };
      const toggleLowerPanel = () => {
        if (!isUpperPopulated) return;
        const wasExpanded = isLowerExpanded;
        isLowerExpanded = !isLowerExpanded;
        applyPanelState();
        if (!wasExpanded && isLowerExpanded) {
          pinUpperToBottomDuringExpand();
        } else {
          stopExpandPin();
        }
      };
      toggleSurface.addEventListener("click", () => {
        toggleLowerPanel();
      });
      toggleSurface.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          toggleLowerPanel();
        }
      });
      applyPanelState();
    }

    function getCaretTextOffset(el) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return 0;
      const range = sel.getRangeAt(0);
      if (!el.contains(range.startContainer)) return 0;
      const preRange = range.cloneRange();
      preRange.selectNodeContents(el);
      preRange.setEnd(range.startContainer, range.startOffset);
      return preRange.toString().length;
    }

    function setCaretTextOffset(el, offset) {
      const targetOffset = Math.max(0, offset);
      const sel = window.getSelection();
      if (!sel) return;
      const range = document.createRange();
      let remaining = targetOffset;
      let placed = false;

      const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
      let node = walker.nextNode();
      while (node) {
        const len = node.textContent ? node.textContent.length : 0;
        if (remaining <= len) {
          range.setStart(node, remaining);
          placed = true;
          break;
        }
        remaining -= len;
        node = walker.nextNode();
      }

      if (!placed) {
        range.selectNodeContents(el);
        range.collapse(false);
      } else {
        range.collapse(true);
      }
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function getSelectionOffsets(el) {
      const sel = window.getSelection();
      if (!sel || sel.rangeCount === 0) return null;
      const range = sel.getRangeAt(0);
      if (!el.contains(range.startContainer)) return null;
      const startRange = range.cloneRange();
      startRange.selectNodeContents(el);
      startRange.setEnd(range.startContainer, range.startOffset);
      const endRange = range.cloneRange();
      endRange.selectNodeContents(el);
      endRange.setEnd(range.endContainer, range.endOffset);
      return { start: startRange.toString().length, end: endRange.toString().length };
    }

    function transferTouchedMask(prevText, currText, prevMask) {
      const oldText = prevText || "";
      const newText = currText || "";
      const oldMask = Array.isArray(prevMask) ? prevMask : [];

      let prefix = 0;
      const maxPrefix = Math.min(oldText.length, newText.length);
      while (prefix < maxPrefix && oldText[prefix] === newText[prefix]) {
        prefix += 1;
      }

      let suffix = 0;
      const maxSuffix = Math.min(oldText.length - prefix, newText.length - prefix);
      while (
        suffix < maxSuffix &&
        oldText[oldText.length - 1 - suffix] === newText[newText.length - 1 - suffix]
      ) {
        suffix += 1;
      }

      const newMask = new Array(newText.length).fill(false);
      for (let i = 0; i < prefix; i += 1) {
        newMask[i] = Boolean(oldMask[i]);
      }
      for (let i = 0; i < suffix; i += 1) {
        const oldIdx = oldText.length - suffix + i;
        const newIdx = newText.length - suffix + i;
        newMask[newIdx] = Boolean(oldMask[oldIdx]);
      }
      return newMask;
    }

    function markTouchedRange(mask, start, end) {
      if (!Array.isArray(mask) || mask.length === 0) return;
      const a = Math.max(0, Math.min(start, mask.length - 1));
      const b = Math.max(a + 1, Math.min(end, mask.length));
      for (let i = a; i < b; i += 1) {
        mask[i] = true;
      }
    }

    function renderMaskHtml(text, mask) {
      const value = text || "";
      if (!value) return "";
      let out = "";
      let open = false;
      for (let i = 0; i < value.length; i += 1) {
        const isTouched = Boolean(mask && mask[i]);
        if (isTouched && !open) {
          out += '<span class="edited-fragment">';
          open = true;
        } else if (!isTouched && open) {
          out += "</span>";
          open = false;
        }
        out += escapeHtml(value[i]);
      }
      if (open) out += "</span>";
      return out;
    }

    function refreshEditableDiff(lineTextEl) {
      const original = lineTextEl.dataset.originalText || "";
      const current = lineTextEl.textContent || "";
      const prevText = lineTextEl.dataset.prevText || "";
      const prevMask = JSON.parse(lineTextEl.dataset.touchedMask || "[]");
      const caretOffset = getCaretTextOffset(lineTextEl);
      const newMask = transferTouchedMask(prevText, current, prevMask);
      const prevTrimLen = prevText.replace(/\s+$/g, "").length;

      const pending = lineTextEl._pendingInput || null;
      if (pending) {
        const insertedLen = pending.data ? pending.data.length : 0;
        if (insertedLen > 0) {
          const insertedText = pending.data || "";
          const whitespaceOnly = /^\s+$/.test(insertedText);
          const beyondSentenceEnd = pending.start >= prevTrimLen;
          if (!(whitespaceOnly && beyondSentenceEnd)) {
            markTouchedRange(newMask, pending.start, pending.start + insertedLen);
          }
        }
      }

      // If the sentence is back to its original content (ignoring trailing whitespace),
      // clear edit highlighting and revert row state to non-edited.
      const originalTrimEnd = original.replace(/\s+$/g, "");
      const currentTrimEnd = current.replace(/\s+$/g, "");
      const matchesOriginal = currentTrimEnd === originalTrimEnd;
      if (matchesOriginal) {
        for (let i = 0; i < newMask.length; i += 1) {
          newMask[i] = false;
        }
      }

      lineTextEl.innerHTML = renderMaskHtml(current, newMask);
      lineTextEl.dataset.prevText = current;
      lineTextEl.dataset.touchedMask = JSON.stringify(newMask);
      const hasEdits = !matchesOriginal;
      const lineEl = lineTextEl.parentElement;
      if (lineEl) {
        lineEl.classList.toggle("edit-dirty", hasEdits);
      }
      setCaretTextOffset(lineTextEl, caretOffset);
      lineTextEl._pendingInput = null;
    }

        instructionEl.innerHTML = '<span class="source-editor-emoji">✏️</span><span>Click any sentence to edit</span>';
        wrapperEl.appendChild(instructionEl);
      }
      if (toolbarEl) {
        wrapperEl.appendChild(toolbarEl);
      }
      wrapperEl.appendChild(contentEl);

      sentenceMappingArray.forEach((item) => {
        const sentenceIndex = Number(item.sentence_index);
        const lineEl = document.createElement("div");
        lineEl.className = "ocr-edit-line";
        lineEl.dataset.sentenceIndex = String(sentenceIndex);
        const lineTextEl = document.createElement("div");
        lineTextEl.className = "ocr-edit-line-text";
        lineTextEl.setAttribute("contenteditable", "true");
        lineTextEl.setAttribute("spellcheck", "false");
        const originalText = item.ocr_sentence || "";
        const currentText = sourceDraftMap.has(sentenceIndex)
          ? sourceDraftMap.get(sentenceIndex)
          : originalText;
        lineTextEl.dataset.originalText = originalText;
        lineTextEl.dataset.prevText = currentText;
        lineTextEl.dataset.touchedMask = JSON.stringify(new Array(currentText.length).fill(false));
        lineTextEl.textContent = currentText;
        if (currentText.replace(/\s+$/g, "") !== originalText.replace(/\s+$/g, "")) {
          lineEl.classList.add("edit-dirty");
        }
        lineTextEl.addEventListener("beforeinput", (event) => {
          const offsets = getSelectionOffsets(lineTextEl);
          if (!offsets) return;
          lineTextEl._pendingInput = {
            start: offsets.start,
            end: offsets.end,
            data: event.data || "",
            inputType: event.inputType || "",
          };
        });
        lineTextEl.addEventListener("input", () => {
          refreshEditableDiff(lineTextEl);
          const currentValue = lineTextEl.textContent || "";
          const originalValue = lineTextEl.dataset.originalText || "";
          if (currentValue.replace(/\s+$/g, "") === originalValue.replace(/\s+$/g, "")) {
            sourceDraftMap.delete(sentenceIndex);
          } else {
            sourceDraftMap.set(sentenceIndex, currentValue);
          }
          updateSourceSaveButtonState(wrapperEl, saveBtn);
        });
        lineEl.appendChild(lineTextEl);
        contentEl.appendChild(lineEl);
      });

      saveBtn.addEventListener("click", () => {
        const lineEls = Array.from(contentEl.querySelectorAll(".ocr-edit-line-text"));
        const editedLines = lineEls
          .map((el) => ({
            sentence_index: Number(el.parentElement?.dataset.sentenceIndex || -1),
            ocr_sentence: el.textContent || "",
          }))
          .filter((row) => row.sentence_index >= 0);

        const byIndex = new Map(editedLines.map((row) => [row.sentence_index, row.ocr_sentence]));
        sentenceMappingArray = sentenceMappingArray.map((entry) => {
          if (!byIndex.has(entry.sentence_index)) return entry;
          return { ...entry, ocr_sentence: byIndex.get(entry.sentence_index) };
        });
        activeWritingText = buildTextFromSentenceMapping(sentenceMappingArray, "ocr_sentence");
        sourceDraftMap = new Map();

        lineEls.forEach((lineTextEl) => {
          const current = lineTextEl.textContent || "";
          lineTextEl.dataset.originalText = current;
          lineTextEl.dataset.prevText = current;
          lineTextEl.dataset.touchedMask = JSON.stringify(new Array(current.length).fill(false));
          lineTextEl.innerHTML = escapeHtml(current);
          const lineEl = lineTextEl.parentElement;
          if (lineEl) {
            lineEl.classList.remove("edit-dirty");
          }
        });

        saveBtn.classList.add("saved");
        saveBtn.textContent = "Saved";
        window.setTimeout(() => {
        saveBtn.classList.remove("saved");
        saveBtn.textContent = "Save";
        updateSourceSaveButtonState(wrapperEl, saveBtn);
      }, 1200);
    });

      containerEl.appendChild(wrapperEl);
      updateSourceSaveButtonState(wrapperEl, saveBtn);
      return wrapperEl;
